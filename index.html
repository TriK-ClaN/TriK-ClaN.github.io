<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./img/flowers.png" type="image/x-icon">
    <title>Flower Animation</title>
</head>
<body>

    <!-- Flying Love Birds Canvas -->
    <div id="birds-container"></div>

    <!-- Greeting Letters: "MY LOVELY BIRDY" -->
    <div class="greetings">
        <span>M</span>
        <span>Y</span>
        <span class="word-gap">&nbsp;</span>
        <span>L</span>
        <span>O</span>
        <span>V</span>
        <span>E</span>
        <span>L</span>
        <span>Y</span>
        <span class="word-gap">&nbsp;</span>
        <span>B</span>
        <span>I</span>
        <span>R</span>
        <span>D</span>
        <span>Y</span>
    </div>

    <!-- Description Text -->
    <div class="description">
        <span>Bundling National Flower Day &amp; Our 43-Month Anniversary Into One Romantic Surprise</span>
    </div>

    <!-- Click Me Button -->
    <div class="button">
        <button class="rainbow-btn">
            <a href="./flowers.html">Click Me</a>
        </button>
    </div>

    <!-- Lottie Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

    <!-- Love Birds JSON Embedded As JS Variable (avoids file:// fetch block) -->
    <script src="./img/Love-Birds.js"></script>

    <!-- Birds Animation Controller -->
    <script src="./js/birds.js"></script>

    <!-- Audio -->
    <script src="./js/audio.js"></script>

</body>
</html>
