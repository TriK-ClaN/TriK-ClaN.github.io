<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Anniversary</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="images/anniversary.ico" type="image/x-icon">
</head>

<body>
  <div class="stars">
    <div class="shooting-stars-container"></div>
    <div class="twinkling-stars-container"></div>
  </div>

  <div class="container">
    <div class="content">
      <div class="text">
        <h1>Happy Anniversary</h1>
        <p>Select one of the following options to reveal a surprise.</p>
      </div>
      <div class="buttons">
        <button id="flowersButton" class="button-85" role="button">Flowers</button>
        <button id="cardButton" class="button-85" role="button" disabled>Card</button>
        <button id="secretButton" class="button-85" role="button">Secret</button>
      </div>
    </div>
  </div>

  <script src="stars.js"></script>
</body>

</html>
