<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAT Practice</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="themeToggleCheckbox">
            <input type="checkbox" id="themeToggleCheckbox" />
            <span class="slider round"></span>
        </label>
    </div>

    <header>
        <h1 id="mainHeaderTitle">GMAT Practice</h1>
        <button id="suddenDeathBtn" class="header-button sudden-death-button">Sudden Death</button>
        <button id="practiceModeBtn" class="header-button practice-mode-button" style="display: none;">Practice Mode</button>
    </header>

    <main id="practiceModeContainer">
        <div class="problem-columns-container">
            <section>
                <h2>Factorials (1! - 10!)</h2>
                <div id="factorials"></div>
            </section>
            <section>
                <h2>Powers of 2 (2<sup>0</sup> - 2<sup>10</sup>)</h2>
                <div id="powers"></div>
            </section>

            <section>
                <h2>Cubes (1<sup>3</sup> - 10<sup>3</sup>)</h2>
                <div id="cubes"></div>
            </section>
            <section>
                <h2>Reciprocals (1/2 - 1/20)</h2>
                <div id="fractions"></div>
            </section>
            <section>
                <h2>Square Roots</h2>
                <div id="square-roots"></div>
            </section>

            <section>
                <h2>Squares (0<sup>2</sup> - 25<sup>2</sup>)</h2>
                <div id="squares"></div>
            </section>

            <section>
                <h2>Multiplication (1x1 - 25x25)</h2>
                <div id="multiplication"></div>
            </section>
        </div>
    </main>

    <main id="suddenDeathModeContainer" style="display: none;">
        <div class="sudden-death-content">
            <div id="sdCategorySelector" class="category-selector">
                <h4>Customize Sudden Death Problems:</h4>
                <div id="sdCategoryTogglesContainer">
                </div>
                <button id="startSuddenDeathCustomBtn" class="header-button">Start Game</button>
                 <p id="sdErrorNoCategory" class="error-message" style="display: none;">Please select at least one problem type!</p>
            </div>
            <div id="suddenDeathProblemArea">
            </div>
        </div>
    </main>
    <div id="suddenDeathScorePopup" class="score-popup" style="display: none;">Score: 0</div>


    <audio id="correct-sound" src="correct-answer.mp3" preload="auto"></audio>
    <audio id="wrong-sound" src="wrong-answer.mp3" preload="auto"></audio>
    <audio id="cheer-sound" src="cheering.mp3" preload="auto"></audio>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>
